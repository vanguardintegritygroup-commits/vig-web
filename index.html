<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Integrity Group | Private Access</title>
    <style>
        /* ANIMACIÓN DE ENTRADA LENTA Y SOFISTICADA */
        @keyframes statelyFade {
            0% { opacity: 0; transform: scale(0.96) translateY(20px); filter: blur(15px); }
            30% { opacity: 0.1; filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* FONDO FIBRA DE CARBONO */
            background-color: #0f0f0f;
            background-image: 
                linear-gradient(45deg, #151515 25%, transparent 25%), 
                linear-gradient(-45deg, #151515 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #151515 75%), 
                linear-gradient(-45deg, transparent 75%, #151515 75%);
            background-size: 4px 4px;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden;
        }

        /* CAPA DE PROFUNDIDAD OSCURA */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.85) 100%);
            z-index: 0;
        }

        /* TARJETA MARMOLEADA GRIS Y BLANCO */
        .card {
            position: relative;
            text-align: center;
            width: 520px;  
            height: 230px; 
            padding: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* EFECTO MÁRMOL CARRARA */
            background-color: #f5f5f5;
            background-image: url('https://www.transparenttextures.com/patterns/marble-similar.png');
            background-repeat: repeat;
            
            /* BORDE BRONCE TÁCTICO */
            border: 1.5px solid #8e6d45; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            z-index: 1;
            
            /* APLICACIÓN DE LA ANIMACIÓN LENTA (5 SEGUNDOS) */
            animation: statelyFade 5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        h1 {
            font-weight: 400;
            letter-spacing: 14px;
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            color: #000;
        }

        .subtitle {
            font-family: 'Helvetica Neue', Helvetica, sans-serif;
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: #555;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            width: 60px;
            background-color: #8e6d45;
            margin: 25px auto;
        }

        p {
            font-family: 'Helvetica Neue', Helvetica, sans-serif;
            font-weight: 400; 
            font-size: 0.7rem;
            color: #222;
            line-height: 1.8;
            margin: 0 0 35px 0;
            text-transform: uppercase;
            letter-spacing: 3.5px;
        }

        .restringido {
            display: block;
            font-weight: 700;
            font-size: 0.6rem;
            color: #700; /* Rojo discreto */
            margin-top: 10px;
        }

        .btn-link {
            display: inline-block;
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.95rem;
            font-style: italic;
            color: #000;
            text-decoration: none;
            letter-spacing: 2.5px;
            transition: all 0.5s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
        }

        .btn-link:hover {
            color: #8e6d45;
            border-bottom: 1px solid #8e6d45;
            letter-spacing: 4.5px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            font-family: 'Helvetica Neue', Helvetica, sans-serif;
            font-size: 0.55rem;
            letter-spacing: 4px;
            color: #777;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="card">
        <h1>VANGUARD</h1>
        <div class="subtitle">INTEGRITY GROUP</div>
        
        <div class="divider"></div>
        
        <p>
            INTELIGENCIA ESTRATÉGICA & SOLUCIONES CORPORATIVAS
            <span class="restringido">PROTOCOLO DE ACCESO RESTRINGIDO</span>
        </p>
        
        <a href="https://wa.me/5656344937?text=Solicito%20apertura%20de%20protocolo%20de%20consulta%20para%20Vanguard%20Integrity%20Group." class="btn-link">
            Iniciar Protocolo de Consulta
        </a>
        
        <div class="footer">
            CONFIDENTIALITY PROTOCOL | © 2026 VIG
        </div>
    </div>

</body>
</html>
